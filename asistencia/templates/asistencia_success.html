<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asistencia Registrada</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f0f4ff; --white: #ffffff; --primary: #6366f1;
      --primary-light: #818cf8; --primary-soft: #eef2ff;
      --secondary: #ec4899; --text: #1e1b4b;
      --text-muted: #6b7280; --border: #e0e7ff;
      --success: #10b981; --success-soft: #ecfdf5;
    }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center;
      padding: 40px 20px;
      background-image:
        radial-gradient(ellipse at 15% 20%, rgba(99,102,241,0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 85% 80%, rgba(236,72,153,0.10) 0%, transparent 50%);
    }
    .success-card {
      background: var(--white); border-radius: 28px;
      box-shadow: 0 8px 48px rgba(99,102,241,0.15);
      border: 1px solid var(--border);
      max-width: 480px; width: 100%;
      overflow: hidden; text-align: center;
    }
    .card-top-bar {
      height: 5px;
      background: linear-gradient(90deg, var(--success), #34d399, var(--primary));
    }
    .card-body { padding: 52px 44px 44px; }
    .success-ring {
      width: 88px; height: 88px;
      background: var(--success-soft); border: 3px solid #6ee7b7;
      border-radius: 50%; display: flex;
      align-items: center; justify-content: center;
      font-size: 2.4rem; margin: 0 auto 28px;
      animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }
    @keyframes pop {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    .success-label {
      display: inline-block; padding: 4px 14px;
      background: var(--success-soft); border: 1px solid #a7f3d0;
      border-radius: 999px; font-size: 0.72rem; font-weight: 700;
      color: var(--success); letter-spacing: 0.1em;
      text-transform: uppercase; margin-bottom: 16px;
    }
    h1 {
      font-size: 1.9rem; font-weight: 800; color: var(--text);
      letter-spacing: -0.02em; margin-bottom: 12px; line-height: 1.2;
    }
    p {
      font-size: 0.95rem; color: var(--text-muted);
      font-weight: 400; line-height: 1.6; margin-bottom: 32px;
    }
    .btn-group {
      display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
    }
    .btn-link {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 13px 24px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 14px; font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.92rem; font-weight: 700; color: white;
      text-decoration: none; transition: all 0.25s;
      box-shadow: 0 4px 18px rgba(99,102,241,0.30);
    }
    .btn-link:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(99,102,241,0.40); }
    .btn-ghost {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 13px 24px; background: transparent;
      border: 1.5px solid var(--border); border-radius: 14px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.92rem; font-weight: 600; color: var(--text-muted);
      text-decoration: none; transition: all 0.25s;
    }
    .btn-ghost:hover { border-color: var(--primary-light); color: var(--primary); }
    .card-footer {
      padding: 18px 44px; border-top: 1px solid var(--border);
      background: var(--primary-soft); font-size: 0.78rem; color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="success-card">
    <div class="card-top-bar"></div>

    <div class="card-body">
      <div class="success-ring">✅</div>
      <div class="success-label">Registro exitoso</div>
      <h1>¡Asistencia Guardada!</h1>
      <p>Tu asistencia ha sido registrada correctamente<br>en el sistema institucional.</p>

      <div class="btn-group">
        <a href="/asistencia/newAsistencia/" class="btn-link">＋ Registrar otra</a>
        <a href="/admin/asistencia/asistencia/" class="btn-ghost">Ver en admin</a>
      </div>
    </div>

    <div class="card-footer">
      🕐 Registrado el <strong id="fecha"></strong>
    </div>
  </div>

  <script>
    const now = new Date();
    document.getElementById('fecha').textContent = now.toLocaleDateString('es-CO', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  </script>
</body>
</html>
